<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Hammerhead Proxy">
	<title>Hammerhead Proxy</title>
	<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔨%3C/text%3E%3C/svg%3E">
	<script src="https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js" defer></script>
	<script type="module">
		import * as BareMux from "https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux/dist/index.mjs";
		window.BareMux = BareMux;
	</script>
	<style>
		:root{
			--bg:#001233;
			--bg2:#003566;
			--card:rgba(2,6,23,.74);
			--line:rgba(100,255,218,.25);
			--text:#e6f1ff;
			--muted:#9fb3c8;
			--accent:#64ffda;
			--accent2:#00b4d8;
			--danger:#ff5b6e;
			--shadow:0 24px 80px rgba(0,0,0,.55);
			font-family:Segoe UI,system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
		}
		*{box-sizing:border-box;margin:0;padding:0}
		html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text)}
		body{
			background:
				radial-gradient(circle at 20% 20%,rgba(100,255,218,.16),transparent 32%),
				radial-gradient(circle at 80% 10%,rgba(0,180,216,.18),transparent 32%),
				linear-gradient(135deg,#001233,#003566,#001d3d);
		}
		button,input{font:inherit}
		button{cursor:pointer}
		#init{
			position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
			background:linear-gradient(135deg,#001233,#003566,#001d3d);
		}
		.init-card{
			width:min(440px,92vw);padding:34px;border:1px solid var(--line);border-radius:26px;
			background:var(--card);box-shadow:var(--shadow);text-align:center;backdrop-filter:blur(18px);
		}
		.logo{font-size:3rem;margin-bottom:10px}
		.init-card h1{color:var(--accent);font-size:2rem;margin-bottom:8px}
		.init-card p{color:var(--muted);line-height:1.6}
		.spinner{
			width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,.14);
			border-top-color:var(--accent);animation:spin .8s linear infinite;margin:20px auto;
		}
		@keyframes spin{to{transform:rotate(360deg)}}
		#app{height:100%;display:flex;flex-direction:column}
		.tabs{
			height:42px;display:flex;align-items:flex-end;gap:6px;padding:6px 12px 0;
			background:rgba(0,18,51,.88);border-bottom:1px solid var(--line);backdrop-filter:blur(18px);
		}
		.tab{
			height:36px;min-width:80px;max-width:210px;display:flex;align-items:center;gap:8px;flex:1;
			padding:0 10px;border:1px solid rgba(255,255,255,.1);border-bottom:none;border-radius:13px 13px 0 0;
			background:rgba(255,255,255,.04);color:var(--muted);overflow:hidden;
		}
		.tab.active{border-color:var(--accent);color:var(--text);background:rgba(100,255,218,.08)}
		.tab-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.9rem}
		.close{border:none;background:transparent;color:inherit;font-size:1.1rem}
		.newtab{width:36px;height:36px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--text)}
		.nav{
			display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(0,18,51,.78);
			border-bottom:1px solid rgba(100,255,218,.16);backdrop-filter:blur(18px);
		}
		.nav button{
			width:38px;height:38px;border-radius:12px;border:1px solid rgba(255,255,255,.11);
			background:rgba(255,255,255,.04);color:var(--text);
		}
		.nav button:hover,.newtab:hover{border-color:var(--accent);color:var(--accent)}
		.address-wrap{flex:1;display:flex;align-items:center;gap:8px}
		#address{
			width:100%;height:42px;border-radius:14px;border:1px solid rgba(255,255,255,.12);
			background:rgba(255,255,255,.06);outline:none;color:var(--text);padding:0 16px;
		}
		#address:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(100,255,218,.1)}
		#frames{position:relative;flex:1;background:#020617}
		iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#020617}
		iframe.hidden{display:none}
		.overlay{
			position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;
			background:rgba(0,0,0,.72);z-index:5;padding:22px;
		}
		.overlay.show{display:flex}
		.overlay-card{width:min(420px,92vw);background:var(--card);border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:var(--shadow)}
		.overlay h2{color:var(--accent);margin-bottom:8px}
		.overlay p{color:var(--muted);word-break:break-word;line-height:1.5}
		#settings{
			position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
			background:rgba(0,0,0,.7);backdrop-filter:blur(12px);padding:20px;
		}
		#settings.show{display:flex}
		.panel{
			width:min(640px,96vw);max-height:86vh;overflow:auto;background:rgba(2,6,23,.96);
			border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:24px;
		}
		.panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
		.panel h2{color:var(--accent)}
		.server{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);border-radius:18px;padding:14px;margin:10px 0}
		.server.active{border-color:var(--accent);background:rgba(100,255,218,.08)}
		.server-top{display:flex;justify-content:space-between;gap:10px;align-items:center}
		.server button,.panel-head button,.custom-row button{
			border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));
			color:#001233;font-weight:800;padding:9px 14px;
		}
		.server small{display:block;color:var(--muted);margin-top:5px;word-break:break-all}
		.custom-row{display:flex;gap:8px;margin-top:14px}
		.custom-row input{flex:1;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:var(--text);padding:10px}
		.nt{
			height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
			background:
				radial-gradient(circle at 30% 20%,rgba(100,255,218,.13),transparent 30%),
				linear-gradient(135deg,#001233,#003566,#001d3d);
		}
		.nt-box{width:min(560px,94vw)}
		.nt h1{font-size:clamp(2.7rem,8vw,5rem);color:var(--accent);margin-bottom:10px}
		.nt p{color:var(--muted);margin-bottom:22px}
		.nt form{display:flex;gap:8px}
		.nt input{flex:1;height:48px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--text);padding:0 16px;outline:none}
		.nt button{border:none;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#001233;font-weight:900;padding:0 20px}
	</style>
</head>
<body>
	<div id="init">
		<div class="init-card">
			<div class="logo">🔨</div>
			<h1>Hammerhead Proxy</h1>
			<p>Loading the Hammerhead browser...</p>
			<div class="spinner"></div>
		</div>
	</div>

	<div id="app">
		<div class="tabs" id="tabs"></div>
		<div class="nav">
			<button onclick="goBack()" title="Back">‹</button>
			<button onclick="goForward()" title="Forward">›</button>
			<button onclick="reloadTab()" title="Reload">⟳</button>
			<div class="address-wrap">
				<input id="address" autocomplete="off" spellcheck="false" placeholder="Search or enter URL">
			</div>
			<button onclick="goHome()" title="Home">⌂</button>
			<button onclick="openSettings()" title="Proxy Settings">⚙</button>
		</div>
		<div id="frames">
			<div class="overlay" id="loading">
				<div class="overlay-card">
					<div class="spinner"></div>
					<h2>Connecting</h2>
					<p id="loadingText">Loading...</p>
				</div>
			</div>
		</div>
	</div>

	<div id="settings">
		<div class="panel">
			<div class="panel-head">
				<h2>🔨 Hammerhead Proxy Settings</h2>
				<button onclick="closeSettings()">Close</button>
			</div>
			<p style="color:var(--muted);line-height:1.5;margin-bottom:14px">Choose a Wisp server. Lower ping usually means faster browsing.</p>
			<div id="serverList"></div>
			<div class="custom-row">
				<input id="customWisp" placeholder="wss://your-server.com/wisp/">
				<button onclick="addCustomWisp()">Add</button>
			</div>
		</div>
	</div>

	<template id="newtab-template">
		<!DOCTYPE html>
		<html>
		<head>
			<meta charset="UTF-8">
			<title>New Tab | Hammerhead Proxy</title>
			<style>
				*{box-sizing:border-box;margin:0;padding:0}
				html,body{width:100%;height:100%;font-family:Segoe UI,system-ui,sans-serif;background:#001233;color:#e6f1ff;overflow:hidden}
				body{display:flex;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle at 30% 20%,rgba(100,255,218,.14),transparent 32%),linear-gradient(135deg,#001233,#003566,#001d3d)}
				.box{width:min(560px,94vw)}
				h1{font-size:clamp(2.7rem,8vw,5rem);color:#64ffda;margin-bottom:10px}
				p{color:#9fb3c8;margin-bottom:22px}
				form{display:flex;gap:8px}
				input{flex:1;height:48px;border-radius:16px;border:1px solid rgba(100,255,218,.28);background:rgba(255,255,255,.07);color:#e6f1ff;padding:0 16px;outline:none}
				button{border:none;border-radius:16px;background:linear-gradient(135deg,#64ffda,#00b4d8);color:#001233;font-weight:900;padding:0 20px;cursor:pointer}
			</style>
		</head>
		<body>
			<div class="box">
				<h1>🔨 Hammerhead</h1>
				<p>Search or enter a URL</p>
				<form id="f">
					<input id="q" autocomplete="off" spellcheck="false" placeholder="Search or enter URL">
					<button>Go</button>
				</form>
			</div>
			<script>
				function nav(v){parent.postMessage({type:'navigate',url:v},'*')}
				document.getElementById('f').onsubmit=e=>{e.preventDefault();const v=document.getElementById('q').value.trim();if(v)nav(v)}
			<\/script>
		</body>
		</html>
	</template>

	<script>
		let WISP_SERVERS = [
			{ name: "Hammerhead Wisp 1", url: "wss://glseries.net/wisp/" },
			{ name: "Hammerhead Wisp 2", url: "wss://wispserver.dev/wisp/" },
			{ name: "Hammerhead Wisp 3", url: "wss://seminar.drama.english.assignment.literature.homebrewer.org/wisp/" },
			{ name: "Hammerhead Wisp 4", url: "wss://admin.proxy.hydrovolter.com/scramjet/wisp/" },
			{ name: "Hammerhead Wisp 5", url: "wss://scram.owoellen.rocks/wisp/" }
		];

		let DEFAULT_WISP = WISP_SERVERS[0].url;
		let scramjet = null;
		let connection = null;
		let tabs = [];
		let activeTabId = null;
		let nextTabId = 1;
		let ntBlobUrl = null;

		const $ = id => document.getElementById(id);
		const getBasePath = () => location.pathname.replace(/[^/]*$/, "");
		const getCurrentWisp = () => localStorage.getItem("proxServer") || DEFAULT_WISP;
		const getStoredWisps = () => { try{return JSON.parse(localStorage.getItem("customWisps")||"[]")}catch{return[]} };
		const getAllWispServers = () => [...WISP_SERVERS,...getStoredWisps()];
		const activeTab = () => tabs.find(t=>t.id===activeTabId);

		async function fetchWispServers(){
			if(!Array.isArray(WISP_SERVERS)||!WISP_SERVERS.length){
				WISP_SERVERS=[{name:"Hammerhead Backup",url:"wss://wisp.rhw.one/wisp/"}];
			}
			if(!DEFAULT_WISP)DEFAULT_WISP=WISP_SERVERS[0].url;
			const saved=localStorage.getItem("proxServer");
			if(!saved)localStorage.setItem("proxServer",DEFAULT_WISP);
			if(saved&&!getAllWispServers().some(s=>s.url===saved)){
				localStorage.setItem("proxServer",DEFAULT_WISP);
			}
		}

		async function pingWispServer(url,timeout=2200){
			return new Promise(resolve=>{
				const start=Date.now();
				try{
					const ws=new WebSocket(url);
					const timer=setTimeout(()=>{try{ws.close()}catch{} resolve({url,success:false,latency:null})},timeout);
					ws.onopen=()=>{clearTimeout(timer);try{ws.close()}catch{} resolve({url,success:true,latency:Date.now()-start})};
					ws.onerror=()=>{clearTimeout(timer);resolve({url,success:false,latency:null})};
				}catch{resolve({url,success:false,latency:null})}
			});
		}

		async function findBestWispServer(){
			const servers=getAllWispServers();
			const results=await Promise.all(servers.map(s=>pingWispServer(s.url)));
			const working=results.filter(r=>r.success).sort((a,b)=>a.latency-b.latency);
			if(working[0])return working[0].url;
			return getCurrentWisp();
		}

		async function autoChooseServer(){
			if(localStorage.getItem("wispAutoswitch")==="false")return;
			const current=getCurrentWisp();
			const currentCheck=await pingWispServer(current,1600);
			if(currentCheck.success)return;
			const best=await findBestWispServer();
			if(best&&best!==current)localStorage.setItem("proxServer",best);
		}

		async function initScramjet(){
			if(typeof $scramjetLoadController==="undefined")throw new Error("Scramjet CDN did not load.");
			const { ScramjetController } = $scramjetLoadController();
			scramjet = new ScramjetController({
				prefix:getBasePath()+"scramjet/",
				files:{
					wasm:"https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.wasm.wasm",
					all:"https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js",
					sync:"https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.sync.js"
				}
			});
			await scramjet.init();
		}

		async function initBareMux(){
			const BM=window.BareMux;
			if(!BM)throw new Error("BareMux did not load.");
			connection = new BM.BareMuxConnection(getBasePath()+"bareworker.js");
			await connection.setTransport(
				"https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@2.1.28/dist/index.mjs",
				[{wisp:getCurrentWisp()}]
			);
		}

		async function registerSW(){
			if(!("serviceWorker" in navigator))throw new Error("Service workers are not supported here.");
			const reg=await navigator.serviceWorker.register(getBasePath()+"sw.js",{scope:getBasePath()});
			await navigator.serviceWorker.ready;
			const config={type:"config",wispurl:getCurrentWisp(),servers:getAllWispServers(),autoswitch:localStorage.getItem("wispAutoswitch")!=="false"};
			const send=()=>{const sw=reg.active||navigator.serviceWorker.controller;if(sw)sw.postMessage(config)};
			send();setTimeout(send,500);setTimeout(send,1500);
			navigator.serviceWorker.addEventListener("message",e=>{
				if(e.data?.type==="wispChanged"&&e.data.url)localStorage.setItem("proxServer",e.data.url);
			});
		}

		function buildNewTab(){
			const html=$("newtab-template").innerHTML;
			ntBlobUrl=URL.createObjectURL(new Blob([html],{type:"text/html"}));
		}

		function renderTabs(){
			const wrap=$("tabs");
			wrap.innerHTML="";
			tabs.forEach(tab=>{
				const el=document.createElement("div");
				el.className="tab"+(tab.id===activeTabId?" active":"");
				el.onclick=()=>switchTab(tab.id);
				el.innerHTML='<span class="tab-title">'+escapeHtml(tab.title||"New Tab")+'</span><button class="close" title="Close">×</button>';
				el.querySelector(".close").onclick=e=>{e.stopPropagation();closeTab(tab.id)};
				wrap.appendChild(el);
			});
			const n=document.createElement("button");
			n.className="newtab";
			n.textContent="+";
			n.onclick=()=>createTab(true);
			wrap.appendChild(n);
		}

		function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}

		function createTab(makeActive=true){
			const frame=scramjet.createFrame();
			const tab={id:nextTabId++,title:"New Tab",url:"",frame,history:["newtab"],historyIndex:0,loading:false};
			frame.frame.src=ntBlobUrl;
			frame.frame.classList.add("hidden");
			frame.frame.setAttribute("referrerpolicy","no-referrer");
			$("frames").appendChild(frame.frame);

			frame.addEventListener("urlchange",e=>{
				tab.url=e.url;
				tab.title=urlTitle(e.url);
				if(tab.history[tab.historyIndex]!==e.url){
					tab.history=tab.history.slice(0,tab.historyIndex+1);
					tab.history.push(e.url);
					tab.historyIndex=tab.history.length-1;
				}
				showLoading(e.url);
				updateAddress();
				renderTabs();
				setTimeout(hideLoading,1800);
			});

			frame.frame.addEventListener("load",()=>{
				hideLoading();
				try{
					const title=frame.frame.contentWindow.document.title;
					if(title)tab.title=title;
				}catch{}
				if(frame.frame.src===ntBlobUrl){tab.title="New Tab";tab.url=""}
				updateAddress();
				renderTabs();
			});

			tabs.push(tab);
			if(makeActive)switchTab(tab.id);
			return tab;
		}

		function urlTitle(url){
			try{return new URL(url).hostname}catch{return "Browsing"}
		}

		function switchTab(id){
			activeTabId=id;
			tabs.forEach(t=>t.frame.frame.classList.toggle("hidden",t.id!==id));
			updateAddress();
			renderTabs();
		}

		function closeTab(id){
			const i=tabs.findIndex(t=>t.id===id);
			if(i<0)return;
			const tab=tabs[i];
			try{tab.frame.frame.src="about:blank";tab.frame.frame.remove()}catch{}
			tabs.splice(i,1);
			if(!tabs.length)createTab(true);
			else if(activeTabId===id)switchTab(tabs[Math.max(0,i-1)].id);
			renderTabs();
		}

		function goHome(){
			const tab=activeTab();
			if(!tab)return;
			tab.frame.frame.src=ntBlobUrl;
			tab.title="New Tab";
			tab.url="";
			tab.history=tab.history.slice(0,tab.historyIndex+1);
			tab.history.push("newtab");
			tab.historyIndex=tab.history.length-1;
			updateAddress();
			renderTabs();
		}

		function normalizeInput(input){
			input=String(input||"").trim();
			if(!input)return "";
			if(/^https?:\/\//i.test(input))return input;
			if(input.includes(".")&&!input.includes(" "))return "https://"+input;
			return "https://duckduckgo.com/?q="+encodeURIComponent(input);
		}

		function navigate(input){
			const tab=activeTab();
			const url=normalizeInput(input);
			if(!tab||!url)return;
			showLoading(url);
			tab.frame.go(url);
		}

		function updateAddress(){
			const tab=activeTab();
			$("address").value=tab&&tab.url?tab.url:"";
		}

		function goBack(){
			const tab=activeTab();
			if(!tab||tab.historyIndex<=0)return;
			tab.historyIndex--;
			const target=tab.history[tab.historyIndex];
			if(target==="newtab")goHome();
			else tab.frame.go(target);
		}

		function goForward(){
			const tab=activeTab();
			if(!tab||tab.historyIndex>=tab.history.length-1)return;
			tab.historyIndex++;
			const target=tab.history[tab.historyIndex];
			if(target==="newtab")goHome();
			else tab.frame.go(target);
		}

		function reloadTab(){
			const tab=activeTab();
			if(tab)tab.frame.reload();
		}

		function showLoading(url){
			$("loadingText").textContent=url||"Loading...";
			$("loading").classList.add("show");
		}

		function hideLoading(){
			$("loading").classList.remove("show");
		}

		function openSettings(){
			renderServers();
			$("settings").classList.add("show");
		}

		function closeSettings(){
			$("settings").classList.remove("show");
		}

		function renderServers(){
			const list=$("serverList");
			const current=getCurrentWisp();
			list.innerHTML="";
			getAllWispServers().forEach(server=>{
				const item=document.createElement("div");
				item.className="server"+(server.url===current?" active":"");
				item.innerHTML='<div class="server-top"><strong>'+escapeHtml(server.name)+'</strong><button>Use</button></div><small>'+escapeHtml(server.url)+'</small><small class="ping">Checking...</small>';
				item.querySelector("button").onclick=()=>setWisp(server.url);
				list.appendChild(item);
				pingWispServer(server.url).then(r=>{
					item.querySelector(".ping").textContent=r.success?("Online • "+r.latency+"ms"):"Offline";
				});
			});
		}

		function setWisp(url){
			localStorage.setItem("proxServer",url);
			location.reload();
		}

		function addCustomWisp(){
			const input=$("customWisp");
			const url=input.value.trim();
			if(!/^wss?:\/\//i.test(url)){alert("Use a ws:// or wss:// Wisp URL");return}
			const list=getStoredWisps();
			if(!list.some(s=>s.url===url)&&!WISP_SERVERS.some(s=>s.url===url)){
				list.push({name:"Custom "+(list.length+1),url});
				localStorage.setItem("customWisps",JSON.stringify(list));
			}
			setWisp(url);
		}

		$("address").addEventListener("keydown",e=>{
			if(e.key==="Enter")navigate($("address").value);
		});
		window.addEventListener("message",e=>{
			if(e.data?.type==="navigate")navigate(e.data.url);
		});

		async function start(){
			try{
				await fetchWispServers();
				await autoChooseServer();
				buildNewTab();
				await initScramjet();
				await initBareMux();
				await registerSW();
				createTab(true);
				$("init").style.display="none";
			}catch(err){
				console.error(err);
				$("init").innerHTML='<div class="init-card"><div class="logo">⚠️</div><h1>Proxy init error</h1><p>'+escapeHtml(err.message||err)+'</p><br><p>Check that proxy/index.html, proxy/sw.js, and proxy/bareworker.js are all in the same folder.</p></div>';
			}
		}

		window.addEventListener("load",start);
	</script>
</body>
</html>
