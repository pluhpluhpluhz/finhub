<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Open site in about:blank iframe</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; padding: 20px; max-width:700px; margin:auto; }
    label { display:block; margin-bottom:8px; font-weight:600; }
    input[type="url"] { width:100%; padding:8px; font-size:16px; box-sizing:border-box; }
    button { margin-top:10px; padding:8px 12px; font-size:16px; }
    .note { margin-top:12px; color:#555; font-size:14px; }
  </style>
</head>
<body>
  <h1>Open a site inside an about:blank iframe</h1>

  <label for="site">Website URL</label>
  <input id="site" type="url" placeholder="https://example.com" value="https://example.com" />

  <div>
    <button id="openBtn">Open in about:blank iframe</button>
  </div>

  <p class="note">This will open a new blank tab and load the requested site inside an iframe on that blank page. Some websites prevent being framed (X-Frame-Options or CSP), in which case they won't appear.</p>

  <script>
    document.getElementById('openBtn').addEventListener('click', function () {
      var urlInput = document.getElementById('site').value.trim();
      if (!urlInput) return;

      // Ensure URL has a scheme
      try {
        var url = new URL(urlInput, window.location.href);
      } catch (e) {
        alert('Please enter a valid URL (e.g. https://example.com).');
        return;
      }

      // Open a blank tab and write an about:blank document that contains an iframe
      var newTab = window.open('about:blank', '_blank');
      if (!newTab) {
        alert('Popup blocked. Allow popups for this site and try again.');
        return;
      }

      // Construct safe HTML for the new tab's document
      var doc = newTab.document;
      var docHtml = '\
<!doctype html>\n\
<html lang="en">\n\
<head>\n\
  <meta charset="utf-8"/>\n\
  <meta name="viewport" content="width=device-width,initial-scale=1"/>\n\
  <title>Framed: ' + url.hostname.replace(/</g, '&lt;') + '</title>\n\
  <style>html,body{height:100%;margin:0}iframe{border:0;width:100%;height:100vh}</style>\n</head>\n<body>\n  <iframe src="' + url.href.replace(/"/g, '%22') + '" sandbox="allow-forms allow-scripts allow-same-origin allow-popups"></iframe>\n</body>\n</html>';

      // Write and close so the content renders
      doc.open();
      doc.write(docHtml);
      doc.close();
    });
  </script>
</body>
</html>
